<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>SubTracker</title>
<meta name="theme-color" content="#0a0a0f" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="SubTracker" />
<meta name="mobile-web-app-capable" content="yes" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='110' fill='%230a0a0f'/%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0%25' stop-color='%237c3aed'/%3E%3Cstop offset='100%25' stop-color='%23a855f7'/%3E%3C/linearGradient%3E%3C/defs%3E%3Ctext x='256' y='350' font-family='Arial Black' font-size='360' font-weight='900' fill='url(%23g)' text-anchor='middle'%3E%24%3C/text%3E%3C/svg%3E" />
<link rel="manifest" href="data:application/json,{%22name%22:%22SubTracker%22,%22short_name%22:%22SubTracker%22,%22start_url%22:%22.%22,%22display%22:%22standalone%22,%22background_color%22:%22%230a0a0f%22,%22theme_color%22:%22%230a0a0f%22,%22orientation%22:%22portrait%22,%22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='110' fill='%230a0a0f'/%3E%3Ctext x='256' y='350' font-family='Arial Black' font-size='360' font-weight='900' fill='%23a855f7' text-anchor='middle'%3E%24%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22512x512%22,%22type%22:%22image/svg+xml%22,%22purpose%22:%22any maskable%22}]}" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

:root {
  --bg: #0a0a0f;
  --surface: #141420;
  --surface2: #1e1e2e;
  --surface3: #252538;
  --border: rgba(255,255,255,0.07);
  --border-strong: rgba(255,255,255,0.15);
  --text: #f0f0f8;
  --text-muted: #8888aa;
  --text-faint: #55556a;
  --accent: #7c3aed;
  --accent-bright: #a855f7;
  --accent-light: rgba(124,58,237,0.15);
  --accent-text: #c084fc;
  --warn: #f59e0b;
  --warn-light: rgba(245,158,11,0.12);
  --danger: #f87171;
  --danger-light: rgba(248,113,113,0.12);
  --success: #34d399;
  --success-light: rgba(52,211,153,0.12);
  --r: 14px;
  --r-sm: 9px;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
  --nav-h: 64px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top: env(safe-area-inset-top, 0px);
}

html { height: 100%; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100%;
  overflow: hidden;
  background-image: radial-gradient(ellipse at 20% 0%, rgba(124,58,237,0.08) 0%, transparent 55%);
}

/* ── Layout ── */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}

/* ── Top header ── */
.top-bar {
  flex-shrink: 0;
  padding: 0 16px;
  padding-top: max(16px, var(--safe-top));
  padding-bottom: 12px;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  gap: 12px;
}
.top-bar h1 {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 2rem;
  letter-spacing: 3px;
  background: linear-gradient(135deg, #f0f0f8 40%, var(--accent-bright));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1;
}
.top-bar-actions { display: flex; gap: 8px; align-items: center; }

/* FAB add button */
.fab {
  width: 44px; height: 44px; border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent-bright));
  border: none; color: #fff; font-size: 22px; font-weight: 300;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; box-shadow: 0 4px 16px rgba(124,58,237,0.45);
  transition: transform 0.15s, box-shadow 0.15s;
  flex-shrink: 0;
}
.fab:active { transform: scale(0.93); box-shadow: 0 2px 8px rgba(124,58,237,0.3); }

.icon-btn-top {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--surface); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-muted);
  transition: background 0.15s, color 0.15s;
}
.icon-btn-top:active { background: var(--surface2); color: var(--text); }

/* ── Scrollable content area ── */
.content {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding: 16px 16px 0;
  padding-bottom: calc(var(--nav-h) + var(--safe-bottom) + 16px);
}

/* ── Summary strip ── */
.summary {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
  margin-bottom: 16px;
}
.metric {
  background: var(--surface);
  border-radius: var(--r);
  padding: 14px 12px;
  border: 1px solid var(--border);
  position: relative; overflow: hidden;
}
.metric::before {
  content:''; position:absolute; top:0; left:0; right:0; height:2px;
  background: linear-gradient(90deg, var(--accent), var(--accent-bright));
  opacity: 0.7;
}
.metric-label {
  font-size: 9px; font-weight: 600; letter-spacing: 0.1em;
  text-transform: uppercase; color: var(--text-faint); margin-bottom: 6px;
}
.metric-value {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem; color: var(--text); line-height: 1; letter-spacing: 1px;
}
.metric-sub { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

/* ── Search bar ── */
.search-row {
  display: flex; gap: 10px; margin-bottom: 12px; align-items: center;
}
.search-wrap { position: relative; flex: 1; }
.search-wrap svg {
  position: absolute; left: 12px; top: 50%;
  transform: translateY(-50%); color: var(--text-faint); pointer-events: none;
}
.search-wrap input {
  width: 100%; height: 44px; padding: 0 14px 0 40px;
  border-radius: 22px; border: 1px solid var(--border);
  background: var(--surface); font-family: 'Inter', sans-serif;
  font-size: 15px; color: var(--text); outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-wrap input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,58,237,0.15); }
.search-wrap input::placeholder { color: var(--text-faint); }

/* filter/sort pill button */
.filter-pill {
  height: 44px; padding: 0 14px;
  border-radius: 22px; border: 1px solid var(--border);
  background: var(--surface); font-family: 'Inter', sans-serif;
  font-size: 13px; color: var(--text-muted);
  display: flex; align-items: center; gap: 6px;
  white-space: nowrap; cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  flex-shrink: 0;
}
.filter-pill.active { border-color: var(--accent); color: var(--accent-text); background: var(--accent-light); }
.filter-pill:active { opacity: 0.8; }

/* ── Filter chips row ── */
.chips-row {
  display: flex; gap: 8px; overflow-x: auto; margin-bottom: 14px;
  padding-bottom: 2px; scrollbar-width: none;
}
.chips-row::-webkit-scrollbar { display: none; }
.chip {
  height: 32px; padding: 0 14px; border-radius: 16px;
  border: 1px solid var(--border); background: var(--surface);
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
  color: var(--text-muted); white-space: nowrap; cursor: pointer;
  transition: all 0.15s; flex-shrink: 0;
}
.chip.active {
  border-color: var(--accent-bright); background: var(--accent-light);
  color: var(--accent-text);
}

/* ── Card list ── */
.sub-list { display: flex; flex-direction: column; gap: 10px; }

.sub-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r);
  padding: 14px 16px;
  display: flex; align-items: flex-start; gap: 14px;
  transition: border-color 0.2s;
  cursor: pointer;
  -webkit-user-select: none; user-select: none;
}
.sub-card:active { border-color: rgba(124,58,237,0.4); background: var(--surface2); }

.sub-icon {
  width: 48px; height: 48px; border-radius: 12px;
  background: var(--surface3); display: flex; align-items: center;
  justify-content: center; font-size: 22px; flex-shrink: 0; overflow: hidden;
  border: 1px solid var(--border);
}
.sub-icon svg { width: 100%; height: 100%; border-radius: 11px; display: block; }
.sub-icon .icon-fallback { font-size: 22px; }

.sub-body { flex: 1; min-width: 0; }
.sub-name {
  font-size: 15px; font-weight: 600; color: var(--text);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.sub-cat { font-size: 12px; color: var(--text-faint); margin-top: 1px; }
.sub-payment { font-size: 12px; color: var(--text-faint); margin-top: 1px; }

.next-pay {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 6px; padding: 3px 8px;
  border-radius: 6px; font-size: 11px; font-weight: 500;
}
.next-pay-count {
  font-size: 10px; font-weight: 700; padding: 1px 5px;
  border-radius: 20px;
}
.next-pay-urgent  { background: rgba(248,113,113,0.1); color: var(--danger); }
.next-pay-urgent .next-pay-count { background: var(--danger); color: #0a0a0f; }
.next-pay-soon    { background: rgba(245,158,11,0.1); color: var(--warn); }
.next-pay-soon .next-pay-count   { background: var(--warn); color: #0a0a0f; }
.next-pay-ok      { background: rgba(52,211,153,0.08); color: var(--success); }
.next-pay-ok .next-pay-count     { background: var(--success); color: #0a0a0f; }
.next-pay-far     { background: var(--surface2); color: var(--text-muted); }
.next-pay-far .next-pay-count    { background: var(--surface3); color: var(--text-muted); }
.next-pay-paused  { background: var(--surface2); color: var(--text-faint); }

.sub-right {
  display: flex; flex-direction: column; align-items: flex-end;
  gap: 6px; flex-shrink: 0;
}
.price-main { font-size: 15px; font-weight: 600; color: var(--text); }
.price-per { font-size: 10px; color: var(--text-faint); }
.badge {
  font-size: 10px; font-weight: 600; padding: 2px 8px;
  border-radius: 20px; letter-spacing: 0.03em;
}
.badge-active    { background: var(--success-light); color: var(--success); }
.badge-trial     { background: var(--warn-light); color: var(--warn); }
.badge-paused    { background: rgba(255,255,255,0.05); color: var(--text-faint); }
.badge-cancelled { background: var(--danger-light); color: var(--danger); }

/* ── Empty state ── */
.empty {
  text-align: center; padding: 4rem 1rem;
  color: var(--text-muted); font-size: 15px;
}
.empty svg { margin: 0 auto 14px; display: block; color: var(--text-faint); }

/* ── Bottom nav ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  height: calc(var(--nav-h) + var(--safe-bottom));
  background: rgba(14,14,22,0.95);
  backdrop-filter: blur(16px);
  border-top: 1px solid var(--border);
  display: flex; align-items: flex-start;
  padding-top: 6px;
  padding-bottom: var(--safe-bottom);
  z-index: 100;
}
.nav-item {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; gap: 3px; padding: 6px 0;
  cursor: pointer; color: var(--text-faint);
  font-size: 10px; font-weight: 500; letter-spacing: 0.04em;
  transition: color 0.15s;
  border: none; background: none; font-family: 'Inter', sans-serif;
}
.nav-item.active { color: var(--accent-text); }
.nav-item svg { transition: transform 0.15s; }
.nav-item:active svg { transform: scale(0.88); }

/* ── Bottom sheet modal ── */
.sheet-overlay {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
  z-index: 200; align-items: flex-end; justify-content: center;
}
.sheet-overlay.open { display: flex; }
.sheet {
  background: var(--surface);
  border-radius: 22px 22px 0 0;
  border: 1px solid var(--border-strong);
  border-bottom: none;
  width: 100%; max-width: 600px;
  max-height: 92vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 0 20px 20px;
  padding-bottom: calc(20px + var(--safe-bottom));
  box-shadow: 0 -20px 60px rgba(0,0,0,0.6);
  animation: slideUp 0.28s cubic-bezier(0.34,1.2,0.64,1);
}
@keyframes slideUp {
  from { transform: translateY(100%); }
  to   { transform: translateY(0); }
}
.sheet-handle {
  width: 36px; height: 4px; border-radius: 2px;
  background: var(--border-strong); margin: 14px auto 20px;
}
.sheet-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 1.6rem; letter-spacing: 2px;
  color: var(--text); margin-bottom: 20px;
}

/* ── Sheet: filter panel ── */
.filter-section { margin-bottom: 20px; }
.filter-section-label {
  font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--text-faint); margin-bottom: 10px;
}
.option-pills { display: flex; flex-wrap: wrap; gap: 8px; }
.opt-pill {
  height: 36px; padding: 0 16px; border-radius: 18px;
  border: 1px solid var(--border); background: var(--surface2);
  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;
  color: var(--text-muted); cursor: pointer; transition: all 0.15s;
}
.opt-pill.active {
  border-color: var(--accent-bright); background: var(--accent-light); color: var(--accent-text);
}

/* ── Sheet: form ── */
.service-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
  gap: 8px; max-height: 200px; overflow-y: auto; margin-bottom: 4px;
}
.service-tile {
  display: flex; flex-direction: column; align-items: center;
  gap: 5px; padding: 10px 4px; border-radius: var(--r-sm);
  border: 1px solid var(--border); background: var(--surface2);
  cursor: pointer; transition: all 0.15s; text-align: center;
}
.service-tile:active, .service-tile.selected {
  border-color: var(--accent-bright); background: var(--accent-light);
}
.service-tile .tile-brand-svg { width: 56px; height: 26px; }
.service-tile .tile-brand-svg svg { width: 100%; height: 100%; border-radius: 4px; display: block; }
.service-tile .tile-emoji { font-size: 22px; line-height: 28px; }
.service-tile span { font-size: 9px; color: var(--text-faint); line-height: 1.2; word-break: break-word; }
.service-tile.selected span { color: var(--accent-text); font-weight: 600; }

.or-divider {
  display: flex; align-items: center; gap: 10px;
  color: var(--text-faint); font-size: 11px; margin: 14px 0;
}
.or-divider::before, .or-divider::after {
  content: ''; flex: 1; height: 1px; background: var(--border);
}

.form-row { margin-bottom: 14px; }
.form-row label {
  display: block; font-size: 11px; font-weight: 600;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--text-faint); margin-bottom: 6px;
}
.form-row input, .form-row select {
  width: 100%; height: 48px; padding: 0 14px;
  border-radius: var(--r-sm); border: 1px solid var(--border);
  background: var(--surface2); font-family: 'Inter', sans-serif;
  font-size: 15px; color: var(--text); outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  -webkit-appearance: none; appearance: none;
}
.form-row input:focus, .form-row select:focus {
  border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,58,237,0.15);
}
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.renew-display {
  height: 48px; padding: 0 14px; border-radius: var(--r-sm);
  border: 1px solid var(--border); background: var(--surface3);
  font-size: 14px; color: var(--text-faint);
  display: flex; align-items: center;
}

.sheet-actions {
  display: flex; gap: 10px; margin-top: 20px;
  padding-top: 16px; border-top: 1px solid var(--border);
}
.btn-save {
  flex: 1; height: 52px;
  background: linear-gradient(135deg, var(--accent), var(--accent-bright));
  border: none; border-radius: 26px;
  font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600;
  color: #fff; cursor: pointer;
  box-shadow: 0 4px 16px rgba(124,58,237,0.4);
}
.btn-save:active { opacity: 0.85; transform: scale(0.98); }
.btn-cancel-sheet {
  height: 52px; padding: 0 20px;
  background: var(--surface2); border: 1px solid var(--border-strong);
  border-radius: 26px; font-family: 'Inter', sans-serif;
  font-size: 15px; color: var(--text-muted); cursor: pointer;
}
.btn-delete-sheet {
  height: 52px; padding: 0 20px;
  background: var(--danger-light); border: none;
  border-radius: 26px; font-family: 'Inter', sans-serif;
  font-size: 15px; font-weight: 600; color: var(--danger); cursor: pointer;
}

/* ── Detail sheet ── */
.detail-header {
  display: flex; align-items: center; gap: 16px; margin-bottom: 20px;
}
.detail-icon {
  width: 60px; height: 60px; border-radius: 14px;
  background: var(--surface3); display: flex; align-items: center;
  justify-content: center; font-size: 28px; overflow: hidden;
  border: 1px solid var(--border); flex-shrink: 0;
}
.detail-icon svg { width: 100%; height: 100%; border-radius: 13px; display: block; }
.detail-name { font-size: 20px; font-weight: 600; color: var(--text); }
.detail-cat  { font-size: 13px; color: var(--text-faint); margin-top: 2px; }
.detail-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 0; border-bottom: 1px solid var(--border);
  font-size: 14px;
}
.detail-row:last-of-type { border-bottom: none; }
.detail-label { color: var(--text-muted); }
.detail-value { color: var(--text); font-weight: 500; text-align: right; max-width: 60%; }
.detail-actions {
  display: flex; gap: 10px; margin-top: 20px;
}
.btn-edit {
  flex: 1; height: 52px;
  background: linear-gradient(135deg, var(--accent), var(--accent-bright));
  border: none; border-radius: 26px;
  font-family: 'Inter', sans-serif; font-size: 16px; font-weight: 600;
  color: #fff; cursor: pointer;
}
.btn-link {
  height: 52px; padding: 0 20px;
  background: var(--surface2); border: 1px solid var(--border-strong);
  border-radius: 26px; font-family: 'Inter', sans-serif;
  font-size: 15px; color: var(--text-muted); cursor: pointer;
  text-decoration: none; display: flex; align-items: center; gap: 6px;
}

/* ── iOS install tip ── */
#ios-tip {
  display: none; position: fixed; bottom: calc(var(--nav-h) + var(--safe-bottom));
  left: 0; right: 0; z-index: 300;
  background: var(--surface2); border-top: 1px solid rgba(124,58,237,0.3);
  padding: 14px 20px; text-align: center;
  box-shadow: 0 -8px 32px rgba(0,0,0,0.5);
}

/* ── Section label ── */
.section-label {
  font-size: 10px; font-weight: 600; letter-spacing: 0.12em;
  text-transform: uppercase; color: var(--text-faint);
  margin-bottom: 10px; padding-left: 2px;
}

/* ── Desktop override — keep it nice on big screens ── */
@media (min-width: 600px) {
  body { overflow: auto; }
  #app { height: auto; min-height: 100vh; overflow: visible; }
  .content {
    overflow: visible; padding-bottom: 40px;
    max-width: 700px; margin: 0 auto;
  }
  .top-bar { max-width: 700px; margin: 0 auto; border-bottom: none; padding-top: max(24px, var(--safe-top)); }
  .bottom-nav { display: none; }
  .sheet, .sheet-overlay { max-width: 100%; }
  .sheet { max-width: 540px; margin: 0 auto; border-radius: 22px; }
  .sheet-overlay { align-items: center; }
  .summary { grid-template-columns: repeat(3, 1fr); }
  .metric-value { font-size: 2rem; }
}
</style>
</head>
<body>
<div id="app">
  <!-- Top bar -->
  <div class="top-bar">
    <div>
      <h1>SubTracker</h1>
    </div>
    <div class="top-bar-actions">
      <button class="icon-btn-top" onclick="openFilter()" id="filter-btn" title="Filter & sort">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="4" y1="6" x2="20" y2="6"/><line x1="8" y1="12" x2="16" y2="12"/><line x1="11" y1="18" x2="13" y2="18"/></svg>
      </button>
      <button class="fab" onclick="openAdd()" title="Add subscription">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </button>
    </div>
  </div>

  <!-- Scrollable content -->
  <div class="content" id="content">

let subs = JSON.parse(localStorage.getItem('subs') || 'null') || MY_SUBS;
let nextId = subs.length ? Math.max(...subs.map(s => s.id)) + 1 : 1;

let selectedService = null;
let filterStatus = 'all', filterCycle = 'all', sortBy = 'renewal';

function save() { localStorage.setItem('subs', JSON.stringify(subs)); }

// ── Helpers ───────────────────────────────────────────────────────────────
function nextRenewalDate(startDateStr, cycle) {
  if (!startDateStr) return null;
  const now = new Date(); now.setHours(0,0,0,0);
  let d = new Date(startDateStr);
  if (cycle === 'yearly') { while (d <= now) d.setFullYear(d.getFullYear()+1); }
  else { while (d <= now) d.setMonth(d.getMonth()+1); }
  return d;
}
function daysUntil(d) { if (!d) return 9999; const n = new Date(); n.setHours(0,0,0,0); return Math.ceil((d-n)/86400000); }
function toMonthly(s) { return s.cycle==='yearly' ? s.price/12 : s.price; }
function fmtDate(d) { return d ? d.toLocaleDateString('en-AU',{month:'short',day:'numeric'}) : '—'; }
function getBrandSvg(name) { return BRAND_SVGS[name] || null; }
function logoHtml(name, emoji) {
  const svg = getBrandSvg(name);
  return svg || `<span class="icon-fallback">${emoji||'📦'}</span>`;
}
function getServiceInfo(name) { return SERVICE_LIBRARY.find(s=>s.name.toLowerCase()===name.toLowerCase())||null; }

// ── Summary ───────────────────────────────────────────────────────────────
function renderSummary() {
  const active = subs.filter(s => s.status==='active'||s.status==='trial');
  const monthly = active.reduce((a,s)=>a+toMonthly(s),0);
  const yearly  = active.reduce((a,s)=>a+(s.cycle==='yearly'?s.price:s.price*12),0);
  const dueSoon = active.filter(s=>{ const d=daysUntil(nextRenewalDate(s.startDate,s.cycle)); return d>=0&&d<=7; }).length;
  document.getElementById('summary').innerHTML = `
    <div class="metric"><div class="metric-label">Monthly</div><div class="metric-value">$${monthly.toFixed(2)}</div><div class="metric-sub">${active.length} active</div></div>
    <div class="metric"><div class="metric-label">Annual</div><div class="metric-value">$${Math.round(yearly).toLocaleString()}</div><div class="metric-sub">excl. paused</div></div>
    <div class="metric"><div class="metric-label">Due soon</div><div class="metric-value">${dueSoon}</div><div class="metric-sub">within 7 days</div></div>`;
}

// ── Render list ───────────────────────────────────────────────────────────
function render() {
  renderSummary();
  const q = document.getElementById('search-input').value.toLowerCase();
  const STATUS_ORDER = { active:0, trial:1, paused:2, cancelled:3 };
  let filtered = subs.filter(s=>
    (!q || s.name.toLowerCase().includes(q)||(s.paymentMethod||'').toLowerCase().includes(q)) &&
    (filterStatus==='all'||s.status===filterStatus) &&
    (filterCycle==='all'||s.cycle===filterCycle)
  );
  filtered.sort((a,b)=>{
    if (sortBy==='name') return a.name.localeCompare(b.name);
    if (sortBy==='status') { const d=(STATUS_ORDER[a.status]??9)-(STATUS_ORDER[b.status]??9); return d||a.name.localeCompare(b.name); }
    if (sortBy==='cost-asc') return toMonthly(a)-toMonthly(b);
    if (sortBy==='cost-desc') return toMonthly(b)-toMonthly(a);
    return daysUntil(nextRenewalDate(a.startDate,a.cycle))-daysUntil(nextRenewalDate(b.startDate,b.cycle));
  });

  document.getElementById('list-label').textContent = filtered.length ? `${filtered.length} subscription${filtered.length!==1?'s':''}` : '';
  const list = document.getElementById('sub-list');
  if (!filtered.length) { list.innerHTML=`<div class="empty">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" style="opacity:0.4"><rect x="2" y="5" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
      <div style="font-size:16px;font-weight:600;color:#f0f0f8;margin-bottom:6px">${filterStatus==='all'&&!q?'No subscriptions yet':'Nothing matches'}</div>
      <div style="font-size:13px;color:#55556a;line-height:1.5">${filterStatus==='all'&&!q?'Tap the <strong style="color:#a855f7">+</strong> button to add your first subscription':'Try adjusting your filters'}</div>
    </div>`; return; }

  list.innerHTML = filtered.map(s => {
    const rd = nextRenewalDate(s.startDate, s.cycle);
    const days = daysUntil(rd);
    const badge = {active:'badge-active',trial:'badge-trial',paused:'badge-paused',cancelled:'badge-cancelled'}[s.status]||'badge-paused';
    const priceHtml = s.cycle==='yearly'
      ? `<div class="price-main">$${s.price.toFixed(2)}/yr</div><div class="price-per">$${toMonthly(s).toFixed(2)}/mo</div>`
      : `<div class="price-main">$${s.price.toFixed(2)}/mo</div>`;

    let npHtml='', npClass='next-pay-paused', npCount='';
    if (s.status==='paused'||s.status==='cancelled') {
      npClass='next-pay-paused'; npCount=s.status; npHtml=`<div class="next-pay ${npClass}"><span class="next-pay-count">${npCount}</span></div>`;
    } else if (!s.startDate) {
      npHtml=`<div class="next-pay next-pay-paused"><span class="next-pay-count">no date</span></div>`;
    } else {
      if (days===0) {npClass='next-pay-urgent';npCount='today';}
      else if (days<=3) {npClass='next-pay-urgent';npCount=`in ${days}d`;}
      else if (days<=7) {npClass='next-pay-soon';npCount=`in ${days}d`;}
      else if (days<=30) {npClass='next-pay-ok';npCount=`in ${days}d`;}
      else {npClass='next-pay-far';npCount=`in ${days}d`;}
      npHtml=`<div class="next-pay ${npClass}">$${s.price.toFixed(2)} · ${fmtDate(rd)}<span class="next-pay-count">${npCount}</span></div>`;
    }

    return `<div class="sub-card" onclick="openDetail(${s.id})">
      <div class="sub-icon">${logoHtml(s.name, s.emoji||EMOJI_MAP[s.category])}</div>
      <div class="sub-body">
        <div class="sub-name">${s.name}</div>
        <div class="sub-cat">${s.category}${s.paymentMethod?` · 💳 ${s.paymentMethod}`:''}</div>
        ${npHtml}
      </div>
      <div class="sub-right">
        ${priceHtml}
        <span class="badge ${badge}">${s.status}</span>
      </div>
    </div>`;
  }).join('');
}

// ── Detail sheet ──────────────────────────────────────────────────────────

    Manage

    <div class="detail-header">
      <div class="detail-icon">${logoHtml(s.name, s.emoji||EMOJI_MAP[s.category])}</div>
      <div>
        <div class="detail-name">${s.name}</div>
        <div class="detail-cat">${s.category}</div>
      </div>
    </div>

    <div class="detail-row"><span class="detail-label">Status</span><span class="detail-value"><span class="badge ${{active:'badge-active',trial:'badge-trial',paused:'badge-paused',cancelled:'badge-cancelled'}[s.status]}">${s.status}</span></span></div>
    <div class="detail-row"><span class="detail-label">Next payment</span><span class="detail-value">${rd?`$${s.price.toFixed(2)} on ${fmtDate(rd)}`:'—'}</span></div>
    <div class="detail-row"><span class="detail-label">Payment method</span><span class="detail-value">${s.paymentMethod||'—'}</span></div>

      <button class="btn-edit" onclick="closeDetail();openEdit(${s.id})">Edit</button>
      ${linkBtn}
    </div>`;
  document.getElementById('detail-overlay').classList.add('open');
}
function closeDetail() { document.getElementById('detail-overlay').classList.remove('open'); }

// ── Form sheet ────────────────────────────────────────────────────────────
function openAdd() { editId=null; selectedService=null; showForm(); }
function openEdit(id) { editId=id; selectedService=null; showForm(subs.find(s=>s.id===id)); }

function tileHtml() {
  return SERVICE_LIBRARY.map((svc,i)=>{
    const svg=BRAND_SVGS[svc.name];
    const icon=svg?`<div class="tile-brand-svg">${svg}</div>`:`<span class="tile-emoji">${svc.emoji}</span>`;
    return `<div class="service-tile" data-idx="${i}" onclick="pickService(${i})">${icon}<span>${svc.name}</span></div>`;
  }).join('');
}

function pickService(idx) {
  selectedService=idx;
  document.querySelectorAll('.service-tile').forEach((t,i)=>t.classList.toggle('selected',i===idx));
  const svc=SERVICE_LIBRARY[idx];
  if (svc.name!=='Custom…') {
    const n=document.getElementById('f-name'); if(n&&!n.value) n.value=svc.name;
    const c=document.getElementById('f-cat'); if(c) c.value=svc.category;
    const u=document.getElementById('f-url'); if(u&&!u.value&&svc.url) u.value=svc.url;
  }
  document.getElementById('f-name').focus();
}

function updateRenew() {
  const sd=document.getElementById('f-start')?.value;
  const cy=document.getElementById('f-cycle')?.value||'monthly';
  const el=document.getElementById('renew-preview'); if(!el) return;
  if (!sd) { el.textContent='Enter start date to calculate'; return; }
  const rd=nextRenewalDate(sd,cy); const d=daysUntil(rd);
  el.textContent=rd?`${fmtDate(rd)} (in ${d} day${d!==1?'s':''})` : '—';
}

function showForm(s={}) {
  document.getElementById('form-title').textContent = editId ? 'Edit Subscription' : 'Add Subscription';
  let preIdx=-1;
  if (s.name) preIdx=SERVICE_LIBRARY.findIndex(sv=>sv.name===s.name);
  document.getElementById('form-body').innerHTML = `
    <div class="service-picker" style="margin-bottom:14px">
      <div class="filter-section-label" style="margin-bottom:8px">Quick pick</div>
      <div class="service-grid">${tileHtml()}</div>
    </div>
    <div class="or-divider">or enter manually</div>
    <div class="form-row"><label>Name</label><input id="f-name" type="text" value="${s.name||''}" placeholder="e.g. Netflix" autocomplete="off" /></div>
    <div class="form-grid">
      <div class="form-row"><label>Price ($)</label><input id="f-price" type="number" min="0" step="0.01" value="${s.price||''}" placeholder="9.99" inputmode="decimal" /></div>
      <div class="form-row"><label>Billing</label>
        <select id="f-cycle" onchange="updateRenew()">
          <option value="monthly" ${s.cycle==='monthly'||!s.cycle?'selected':''}>Monthly</option>
          <option value="yearly" ${s.cycle==='yearly'?'selected':''}>Yearly</option>
        </select>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-row"><label>Category</label>
        <select id="f-cat">${CATEGORIES.map(c=>`<option value="${c}" ${s.category===c?'selected':''}>${EMOJI_MAP[c]} ${c[0].toUpperCase()+c.slice(1)}</option>`).join('')}</select>
      </div>
      <div class="form-row"><label>Status</label>
        <select id="f-status">
          <option value="active" ${s.status==='active'||!s.status?'selected':''}>Active</option>
          <option value="trial" ${s.status==='trial'?'selected':''}>Trial</option>
          <option value="paused" ${s.status==='paused'?'selected':''}>Paused</option>
          <option value="cancelled" ${s.status==='cancelled'?'selected':''}>Cancelled</option>
        </select>
      </div>
    </div>
    <div class="form-row"><label>Billing start date</label><input id="f-start" type="date" value="${s.startDate||''}" oninput="updateRenew()" /></div>
    <div class="form-row"><label>Next renewal (auto)</label><div class="renew-display" id="renew-preview">Enter start date to calculate</div></div>
    <div class="form-row"><label>Payment method</label><input id="f-payment" type="text" value="${s.paymentMethod||''}" placeholder="e.g. ANZ Visa, PayPal" /></div>
    <div class="form-row"><label>Website URL (optional)</label><input id="f-url" type="url" value="${s.url||''}" placeholder="https://..." /></div>
    <div class="form-row"><label>Notes (optional)</label><input id="f-notes" type="text" value="${s.notes||''}" placeholder="e.g. Family plan" /></div>
    <div class="sheet-actions">
      ${editId?`<button class="btn-delete-sheet" onclick="deleteSub(${editId})">Delete</button>`:''}
      <button class="btn-cancel-sheet" onclick="closeForm()">Cancel</button>
      <button class="btn-save" onclick="saveSub()">Save</button>
    </div>`;
  if (preIdx>=0) { document.querySelectorAll('.service-tile')[preIdx]?.classList.add('selected'); selectedService=preIdx; }
  updateRenew();
  document.getElementById('form-overlay').classList.add('open');
  setTimeout(()=>document.getElementById('f-name').focus(), 350);
}

function closeForm() { document.getElementById('form-overlay').classList.remove('open'); selectedService=null; }

function saveSub() {
  const name=document.getElementById('f-name').value.trim();
  const price=parseFloat(document.getElementById('f-price').value);
  if (!name||isNaN(price)||price<0) { alert('Please enter a name and price.'); return; }
  let emoji=null;
  if (selectedService!==null) emoji=SERVICE_LIBRARY[selectedService]?.emoji;
  else if (editId) emoji=subs.find(s=>s.id===editId)?.emoji;
  if (!emoji) emoji=getServiceInfo(name)?.emoji||null;
  let url=document.getElementById('f-url').value.trim();
  if (!url) url=getServiceInfo(name)?.url||'';
  const sub={
    id:editId||nextId++, name, price, emoji,
    cycle:document.getElementById('f-cycle').value,
    category:document.getElementById('f-cat').value,
    status:document.getElementById('f-status').value,
    startDate:document.getElementById('f-start').value,
    paymentMethod:document.getElementById('f-payment').value.trim(),
    url, notes:document.getElementById('f-notes').value.trim(),
  };
  subs=editId?subs.map(s=>s.id===editId?sub:s):[...subs,sub];
  save(); closeForm(); render();
}

function deleteSub(id) {
  if (!confirm('Delete this subscription?')) return;
  subs=subs.filter(s=>s.id!==id); save(); closeForm(); closeDetail(); render();
}

// ── Filter sheet ──────────────────────────────────────────────────────────
function openFilter() { document.getElementById('filter-overlay').classList.add('open'); }
function closeFilter() { document.getElementById('filter-overlay').classList.remove('open'); }

function initFilterPills(groupId, current, setter) {
  document.querySelectorAll(`#${groupId} .opt-pill`).forEach(p=>{
    p.classList.toggle('active', p.dataset.val===current);
    p.onclick=()=>{
      document.querySelectorAll(`#${groupId} .opt-pill`).forEach(x=>x.classList.remove('active'));
      p.classList.add('active');
    };
  });
}

function applyFilter() {
  filterStatus=document.querySelector('#fp-status .opt-pill.active')?.dataset.val||'all';
  filterCycle=document.querySelector('#fp-cycle .opt-pill.active')?.dataset.val||'all';
  sortBy=document.querySelector('#fp-sort .opt-pill.active')?.dataset.val||'renewal';
  // sync top chips
  document.querySelectorAll('#status-chips .chip').forEach(c=>c.classList.toggle('active',c.dataset.val===filterStatus));
  closeFilter(); render();
}

// ── Chip / nav helpers ────────────────────────────────────────────────────
function setChip(group, el) {
  document.querySelectorAll('#status-chips .chip').forEach(c=>c.classList.remove('active'));
  el.classList.add('active');
  filterStatus=el.dataset.val;
  // sync filter sheet
  document.querySelectorAll('#fp-status .opt-pill').forEach(p=>p.classList.toggle('active',p.dataset.val===filterStatus));
  render();
}

function filterByStatus(val) {
  filterStatus=val;
  document.querySelectorAll('#status-chips .chip').forEach(c=>c.classList.toggle('active',c.dataset.val===val));
  document.querySelectorAll('#fp-status .opt-pill').forEach(p=>p.classList.toggle('active',p.dataset.val===val));
  render();
}

function scrollToTop() {
  filterStatus='all';
  document.querySelectorAll('#status-chips .chip').forEach(c=>c.classList.toggle('active',c.dataset.val==='all'));
  render();
  document.getElementById('content').scrollTo({top:0,behavior:'smooth'});
}

// ── PWA ───────────────────────────────────────────────────────────────────
const isIOS=/iphone|ipad|ipod/i.test(navigator.userAgent);
if (isIOS && !window.navigator.standalone && !localStorage.getItem('ios-tip')) {
  setTimeout(()=>{ document.getElementById('ios-tip').style.display='block'; },2500);
}
if ('serviceWorker' in navigator) {
  const sw=`const C='st-v1';self.addEventListener('install',e=>{self.skipWaiting();});self.addEventListener('activate',e=>{self.clients.claim();});self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>new Response('',{status:503}))));});`;
  navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:'application/javascript'}))).catch(()=>{});
}

document.addEventListener('keydown',e=>{ if(e.key==='Escape'){closeForm();closeDetail();closeFilter();} });
render();
</script>
